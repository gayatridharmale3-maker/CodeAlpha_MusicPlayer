<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeAlpha Music Player</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

    <div class="container">

        <!--========================
            MUSIC PLAYER
        ==========================-->

        <div class="music-player">

            <h2>🎵 Music Player</h2>

            <!-- Album Cover -->
            <div class="cover">
                <img id="cover" src="cover1.png.png" alt="Album Cover">
            </div>

            <!-- Song Info -->
            <div class="song-info">
                <h3 id="title">Neon Beats</h3>
                <p id="artist">Royalty Free Artist</p>
            </div>

            <!-- Progress -->

            <div class="progress-area">

                <span id="current-time">0:00</span>

                <input
                    type="range"
                    id="progress"
                    value="0"
                    min="0"
                    max="100">

                <span id="duration">0:00</span>

            </div>

            <!-- Controls -->

            <div class="controls">

                <button id="prev">
                    <i class="fa-solid fa-backward-step"></i>
                </button>

                <button id="play">
                    <i class="fa-solid fa-play"></i>
                </button>

                <button id="next">
                    <i class="fa-solid fa-forward-step"></i>
                </button>

            </div>

            <!-- Volume -->

            <div class="volume">

                <i class="fa-solid fa-volume-low"></i>

                <input
                    type="range"
                    id="volume"
                    min="0"
                    max="1"
                    step="0.01"
                    value="1">

            </div>

            <!-- Hidden Audio -->

            <audio id="audio"></audio>

        </div>

        <!--========================
              PLAYLIST
        ==========================-->

        <div class="playlist">

            <h2>Playlist</h2>

            <ul id="playlist">

                <li class="active">

                    <img
                        src="cover1.png.png"
                        alt="Song 1">

                    <div>

                        <h4>Neon Beats</h4>

                        <small>Royalty Free Artist</small>

                    </div>

                    <span>03:20</span>

                </li>

                <li>

                    <img
                        src="cover2.png.jpg"
                        alt="Song 2">

                    <div>

                        <h4>Sunset Vibes</h4>

                        <small>Royalty Free Artist</small>

                    </div>

                    <span>02:58</span>

                </li>

                <li>

                    <img
                        src="cover3.png.png"
                        alt="Song 3">

                    <div>

                        <h4>Midnight Waves</h4>

                        <small>Royalty Free Artist</small>

                    </div>

                    <span>03:45</span>

                </li>

            </ul>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
